// ── Lab control (prod side) ───────────────────────────────────────────────────
async function loadLabControl() {
  var el = document.getElementById('lab-control-content');
  if (!el) return;
  el.innerHTML = '<div class="spinner"></div>';
  try {
    var d = await api('GET', '/lab-control/status');
    var c = d.container;
    var manifest = d.manifest;
    var releases = manifest && manifest.releases || [];
    var stateColor = c.state === 'running' ? 'var(--sage)' : '#C0392B';
    var stateIcon  = c.state === 'running' ? '🟢' : '🔴';

    var relRows = releases.map(function(r, i) {
      var date = r.published_at ? new Date(r.published_at).toLocaleString('no', {dateStyle:'short', timeStyle:'short'}) : '';
      return '<tr>' +
        '<td style="font-family:monospace;font-size:.82rem;font-weight:600">' + e(r.version) + (i===0?' <span style="font-size:.72rem;color:var(--sage)">← siste</span>':'') + '</td>' +
        '<td style="font-size:.82rem;color:var(--muted)">' + e(r.changelog||'–') + '</td>' +
        '<td style="font-size:.78rem;color:var(--muted)">' + date + '</td>' +
        '<td>' +
        '<button class="btn btn-ghost btn-sm" data-ver="' + e(r.version) + '" onclick="deployToLab(this.dataset.ver)">↩️ Gjenopprett lab</button>' +
        '</td></tr>';
    }).join('');

    el.innerHTML =
      '<div class="card" style="margin-bottom:14px">' +
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">' +
      '<h3 style="font-size:1rem">🧪 Lab-container</h3>' +
      '<span style="font-size:.85rem;font-weight:700;color:' + stateColor + '">' + stateIcon + ' ' + e(c.state) + '</span>' +
      '<span style="font-size:.78rem;color:var(--muted)">' + e(c.status) + ' · ID: ' + e(c.id) + '</span>' +
      '<button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="restartLab()">🔄 Restart lab</button>' +
      '<button class="btn btn-ghost btn-sm" onclick="loadLabControl()">↻ Oppdater</button>' +
      '</div>' +
      '<div style="font-size:.82rem;color:var(--muted)">Image: ' + e(c.image) + '</div>' +
      '</div>' +

      '<div class="card">' +
      '<h3 style="font-size:.95rem;margin-bottom:12px">📋 Tilgjengelige versjoner på GitHub</h3>' +
      (releases.length ? '<div class="card" style="padding:0;overflow:hidden"><table>' +
      '<thead><tr><th>Versjon</th><th>Endringslogg</th><th>Publisert</th><th></th></tr></thead>' +
      '<tbody>' + relRows + '</tbody></table></div>' :
      '<p style="color:var(--muted);text-align:center;padding:20px">Ingen versjoner publisert til GitHub ennå.</p>') +
      '<div id="lab-deploy-status" style="margin-top:12px"></div>' +
      '</div>';

  } catch(err) {
    el.innerHTML = '<div class="card" style="color:#C0392B">' +
      '<p>' + e(err.message) + '</p>' +
      (err.message.includes('Portainer') ?
        '<p style="font-size:.82rem;margin-top:8px;color:var(--muted)">Legg til PORTAINER_URL, PORTAINER_TOKEN, PORTAINER_LAB_CONTAINER i prod-stacken i Portainer.</p>' : '') +
      '</div>';
  }
}

async function restartLab() {
  if (!confirm('Restarte lab-containeren?')) return;
  try {
    var d = await api('POST', '/lab-control/restart');
    toast('✅ ' + d.message);
    setTimeout(loadLabControl, 3000);
  } catch(err) { toast(err.message, true); }
}

async function deployToLab(version) {
  if (!confirm('Gjenopprette lab til versjon ' + version + '? Lab-containeren restarter automatisk og henter versjonen fra GitHub.')) return;
  var status = document.getElementById('lab-deploy-status');
  if (status) status.innerHTML = '<div style="color:var(--sky);font-size:.82rem">⏳ Sender gjenopprettingskommando…</div>';
  try {
    var d = await api('POST', '/lab-control/deploy', { version: version });
    var steps = (d.steps||[]).map(function(s){ return '<div style="font-size:.8rem">'+e(s)+'</div>'; }).join('');
    if (status) status.innerHTML = '<div style="background:#f0faf0;border:1px solid var(--sage);border-radius:6px;padding:10px"><strong style="color:var(--sage)">'+e(d.message)+'</strong>'+steps+'</div>';
    setTimeout(loadLabControl, 5000);
  } catch(err) {
    if (status) status.innerHTML = '<div style="color:#C0392B;font-size:.82rem">❌ '+e(err.message)+'</div>';
  }
}

// Show trust status banner for pending users
async function checkTrustStatus() {
  if (!state.user) return;
  var status = state.user.trust_status;
  if (status === 'pending') {
    var banner = document.createElement('div');
    banner.style.cssText = 'background:#FEF0E8;border-bottom:1px solid var(--terra);padding:10px 24px;text-align:center;font-size:.88rem;color:var(--brown)';
    banner.innerHTML = '⏳ <strong>Kontoen din venter på godkjenning.</strong> Du kan søke om hjelp, men ikke tilby tjenester ennå. Be en eksisterende bruker gå god for deg for å fremskynde prosessen.';
    document.body.insertBefore(banner, document.getElementById('topbar'));
  } else if (status === 'vouched') {
    var banner = document.createElement('div');
    banner.style.cssText = 'background:#EBF5EC;border-bottom:1px solid var(--sage);padding:10px 24px;text-align:center;font-size:.88rem;color:var(--brown)';
    banner.innerHTML = '🤝 <strong>Noen har gått god for deg!</strong> Admin vil snart gjennomgå kontoen din.';
    document.body.insertBefore(banner, document.getElementById('topbar'));
  }
}

async function loadAdminTerms() {
  var el = document.getElementById('admin-terms-content');
  if (!el) return;
  el.innerHTML = '<div class="spinner"></div>';
  try {
    var versions = await api('GET', '/terms/versions');
    var current  = versions.find(function(v){ return v.is_current; }) || versions[0];

    el.innerHTML =
      '<div style="display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start">' +

      // Editor
      '<div>' +
      '<div class="card" style="margin-bottom:12px">' +
      '<h3 style="font-size:.95rem;margin-bottom:12px">✏️ Rediger og publiser ny versjon</h3>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">' +
      '<div><label style="font-size:.75rem;color:var(--muted)">Ny versjonsnummer</label>' +
      '<input id="terms-new-ver" placeholder="f.eks. 1.1" style="margin-top:4px"></div>' +
      '<div><label style="font-size:.75rem;color:var(--muted)">Endringssammendrag (vises i e-post)</label>' +
      '<input id="terms-summary" placeholder="Hva er endret?" style="margin-top:4px"></div>' +
      '</div>' +
      '<label style="font-size:.75rem;color:var(--muted)">Innhold (plain text, bruk linjeskift mellom avsnitt)</label>' +
      '<textarea id="terms-content" style="width:100%;min-height:400px;margin-top:4px;font-family:monospace;font-size:.82rem;line-height:1.6;resize:vertical">' +
      e(current ? current.content : '') +
      '</textarea>' +
      '<div id="terms-err" class="form-err"></div>' +
      '<div style="display:flex;gap:8px;margin-top:10px;align-items:center">' +
      '<button class="btn btn-primary" onclick="publishTerms()">📧 Publiser og send til alle brukere</button>' +
      '<span style="font-size:.78rem;color:var(--muted)">Sender e-post + varsling til alle aktive brukere</span>' +
      '</div></div>' +
      '</div>' +

      // Version history sidebar
      '<div>' +
      '<div class="card">' +
      '<h3 style="font-size:.9rem;margin-bottom:10px">📋 Versjonshistorikk</h3>' +
      (versions.length ? versions.map(function(v) {
        return '<div style="padding:8px 0;border-bottom:1px solid var(--border)">' +
          '<div style="display:flex;align-items:center;justify-content:space-between">' +
          '<span style="font-weight:600;font-size:.88rem">v' + e(v.version) + '</span>' +
          (v.is_current ? '<span style="font-size:.72rem;background:#EBF5EC;color:var(--sage);padding:2px 7px;border-radius:8px">Aktiv</span>' : '') +
          '</div>' +
          '<div style="font-size:.78rem;color:var(--muted)">' + new Date(v.published_at*1000).toLocaleDateString('no') + '</div>' +
          (v.summary ? '<div style="font-size:.78rem;margin-top:3px">' + e(v.summary) + '</div>' : '') +
          '<button class="btn btn-ghost btn-sm" style="margin-top:4px" onclick="loadTermsVersion(' + v.id + ')">Vis</button>' +
          '</div>';
      }).join('') : '<p style="color:var(--muted);font-size:.85rem">Ingen versjoner ennå.</p>') +
      '</div></div>' +
      '</div>';

    // Store versions for reference
    window._termsVersions = versions;
  } catch(err) { el.innerHTML = '<div class="card" style="color:#C0392B">' + e(err.message) + '</div>'; }
}

function loadTermsVersion(id) {
  var v = (window._termsVersions || []).find(function(v){ return v.id === id; });
  if (!v) return;
  var el = document.getElementById('terms-content');
  if (el) el.value = v.content;
  var ver = document.getElementById('terms-new-ver');
  if (ver) ver.placeholder = 'Basert på v' + v.version;
  toast('Versjon ' + v.version + ' lastet inn i editoren.');
}

async function publishTerms() {
  var version = document.getElementById('terms-new-ver').value.trim();
  var content2 = document.getElementById('terms-content').value.trim();
  var summary  = document.getElementById('terms-summary').value.trim();
  var errEl    = document.getElementById('terms-err');
  if (errEl) errEl.textContent = '';
  if (!version || !content2 || !summary) {
    if (errEl) errEl.textContent = 'Versjonsnummer, innhold og endringssammendrag er påkrevd.';
    return;
  }
  if (!confirm('Publisere brukeravtale v' + version + '? Dette sender varsel til alle aktive brukere.')) return;


  try {
    var d = await api('POST', '/terms/publish', { version: version, content: content2, summary: summary });
    toast('✅ ' + d.message);
    loadAdminTerms();
  } catch(err) { if (errEl) errEl.textContent = err.message; }
}

// ── Admin categories ─────────────────────────────────────────────────────────
var _editCatId = null;

function openAdminCatForm(parentId, editId, name, slug, icon, color) {
  _editCatId = editId || null;
  var form = document.getElementById('admin-cat-form');
  if (!form) return;
  form.style.display = 'block';
  var parentInput   = document.getElementById('acf-parent-id');
  var parentLabel   = document.getElementById('acf-parent-label');
  var iconSection   = document.getElementById('acf-icon-section');
  var nameEl        = document.getElementById('acf-name');
  var slugEl        = document.getElementById('acf-slug');
  var iconEl        = document.getElementById('acf-icon');
  var colorEl       = document.getElementById('acf-color');
  var iconPreview   = document.getElementById('acf-icon-preview');
  var errEl         = document.getElementById('acf-err');
  if (errEl) errEl.textContent = '';
  if (nameEl) nameEl.value  = name  || '';
  if (slugEl) { slugEl.value = slug || ''; slugEl.disabled = !!editId; }
  if (iconEl) iconEl.value  = icon  || '';
  if (colorEl && color) colorEl.value = color;
  if (iconPreview) iconPreview.textContent = icon || '';
  if (parentInput) parentInput.value = parentId || '';

  if (parentLabel) {
    if (parentId && !editId) {
      var parentName = '';
      var tree = state.categoryTree || [];
      for (var r of tree) {
        if (String(r.id) === String(parentId)) { parentName = r.name; break; }
        for (var s of (r.children||[])) { if (String(s.id) === String(parentId)) { parentName = r.name + ' › ' + s.name; break; } }
      }
      parentLabel.textContent = 'Underkategori av: ' + parentName;
      parentLabel.style.display = '';
      if (iconSection) iconSection.style.display = 'none';
    } else {
      parentLabel.style.display = 'none';
      if (iconSection) iconSection.style.display = '';
    }
  }
}

async function saveAdminCat() {
  var nameEl = document.getElementById('acf-name');
  var slugEl = document.getElementById('acf-slug');
  var iconEl = document.getElementById('acf-icon');
  var colorEl = document.getElementById('acf-color');
  var parentEl = document.getElementById('acf-parent-id');
  var errEl = document.getElementById('acf-err');
  var name = nameEl ? nameEl.value.trim() : '';
  var slug = slugEl ? slugEl.value.trim() : '';
  var icon = iconEl ? iconEl.value.trim() : '';
  var color = colorEl ? colorEl.value : '#AAAAAA';
  var parentId = parentEl ? (parentEl.value || null) : null;
  if (errEl) errEl.textContent = '';
  try {
    if (_editCatId) {
      await api('PUT', '/admin/categories/' + _editCatId, { name, icon, color });
      toast('Oppdatert!');
    } else {
      await api('POST', '/admin/categories', { name, slug, icon, color, parent_id: parentId });
      toast('Kategori opprettet!');
    }
    document.getElementById('admin-cat-form').style.display = 'none';
    _editCatId = null;
    loadAdminCats();
    loadCategories();
  } catch(err) { if (errEl) errEl.textContent = err.message; }
}

async function loadAdminCats() {
  var el = document.getElementById('admin-cat-list');
  if (!el) return;
  el.innerHTML = '<div class="spinner"></div>';
  try {
    var cats = await api('GET', '/admin/categories');
    // Build tree
    var byId = {};
    for (var c of cats) byId[c.id] = { ...c, children: [] };
    var roots = [];
    for (var c of cats) {
      if (c.parent_id && byId[c.parent_id]) byId[c.parent_id].children.push(byId[c.id]);
      else if (!c.parent_id) roots.push(byId[c.id]);
    }

    function renderCatNode(c, depth) {
      var indent = depth * 20;
      var isRoot = depth === 0;
      var isSub  = depth === 1;
      var html = '<div style="display:flex;align-items:center;gap:8px;padding:7px 10px 7px ' + (10+indent) + 'px;border-bottom:1px solid var(--border);' + (isRoot ? 'background:var(--warm);font-weight:600' : '') + '">' +
        '<span style="font-size:' + (isRoot ? '1.1rem' : '.95rem') + '">' + (c.icon||'') + '</span>' +
        '<span style="flex:1;font-size:.88rem">' + e(c.name) + '</span>' +
        '<span style="font-size:.75rem;color:var(--muted);margin-right:6px">' + c.slug + '</span>' +
        (isRoot ? '<span style="width:16px;height:16px;border-radius:50%;background:' + (c.color||'#aaa') + ';display:inline-block"></span>' : '') +
        '<span style="font-size:.75rem;color:var(--muted)">' + c.count + '</span>' +
        '<button class="btn btn-ghost btn-sm" onclick="openAdminCatForm(' + (c.parent_id||'null') + ',' + c.id + ',\'' + e(c.name) + '\',\'' + c.slug + '\',\'' + (c.icon||'') + '\',\'' + (c.color||'') + '\')">✏️</button>' +
        '<button class="btn btn-ghost btn-sm" style="color:#C0392B" onclick="adminDeleteCat(' + c.id + ')">🗑️</button>' +
        (isRoot || isSub ? '<button class="btn btn-ghost btn-sm" style="font-size:.75rem" onclick="openAdminCatForm(' + c.id + ')">+ Sub</button>' : '') +
        '</div>';
      for (var ch of (c.children||[])) html += renderCatNode(ch, depth+1);
      return html;
    }

    el.innerHTML = '<div class="card" style="padding:0;overflow:hidden">' + roots.map(function(r){ return renderCatNode(r, 0); }).join('') + '</div>';
  } catch(err) { el.innerHTML = '<p style="color:#C0392B">' + e(err.message) + '</p>'; }
}

async function adminDeleteCat(id) {
  if (!confirm('Slette kategorien? Underkategorier og spesialiteter slettes også.')) return;
  try { await api('DELETE', '/admin/categories/' + id); toast('Slettet.'); loadAdminCats(); loadCategories(); }
  catch(err) { toast(err.message, true); }
}

async function openTerms(forceAccept) {
  var overlay = document.getElementById('modal-overlay');
  var title   = document.getElementById('modal-title');
  var body    = document.getElementById('modal-body');
  title.textContent = '\u2601 Brukeravtale \u2013 Hjelpetorget';
  body.innerHTML = '<div style="text-align:center;padding:20px"><div class="spinner"></div></div>';
  overlay.classList.add('open');
  try {
    var t = await api('GET', '/terms/current');
    if (!t) { body.innerHTML = '<p style="color:var(--muted)">Ingen brukeravtale funnet.</p>'; return; }
    var date = new Date(t.published_at * 1000).toLocaleDateString('no', {year:'numeric',month:'long',day:'numeric'});
    var paras = t.content.split('\n\n').filter(Boolean);
    var contentHtml = paras.map(function(p) {
      var lines2 = p.trim().split('\n');
      var isHeading = /^\d+\./.test(lines2[0]);
      if (isHeading) {
        return '<div style="margin-bottom:14px"><h3 style="font-size:.92rem;color:var(--terra);margin-bottom:5px">' + e(lines2[0]) + '</h3>' +
          (lines2.slice(1).join('\n').trim() ? '<p style="font-size:.85rem;line-height:1.6">' + e(lines2.slice(1).join(' ').trim()) + '</p>' : '') + '</div>';
      }
      return '<p style="font-size:.85rem;line-height:1.6;margin-bottom:10px">' + e(p.trim()) + '</p>';
    }).join('');
    body.innerHTML =
      '<div style="max-height:55vh;overflow-y:auto;padding-right:4px;margin-bottom:12px">' +
      '<p style="font-size:.82rem;color:var(--muted);margin-bottom:16px">Versjon ' + e(t.version) + ' \u00b7 ' + date + '</p>' +
      contentHtml + '</div>' +
      (forceAccept ?
        '<div style="border-top:1px solid var(--border);padding-top:12px">' +
        '<p style="font-size:.85rem;margin-bottom:10px;color:var(--brown)">Brukeravtalen er oppdatert til versjon ' + e(t.version) + '. Du m\u00e5 godta den nye avtalen for \u00e5 fortsette.</p>' +
        '<button class="btn btn-primary" style="width:100%" onclick="acceptNewTerms()">\u2705 Jeg godtar brukeravtalen v' + e(t.version) + '</button>' +
        '</div>' : '');
  } catch(err) {
    body.innerHTML = '<p style="color:#C0392B">' + e(err.message) + '</p>';
  }
}

async function acceptNewTerms() {
  try {
    await api('POST', '/terms/accept');
    closeModal();
    // Remove the re-accept banner
    var banner = document.getElementById('terms-banner');
    if (banner) banner.remove();
    toast('✅ Brukeravtalen er godtatt.');
  } catch(err) { toast(err.message, true); }
}
